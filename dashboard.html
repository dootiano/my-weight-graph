<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <title>л§ҲмӣЁк·ё | My Weight Graph</title>
  <meta property="og:title" content="л§ҲмӣЁк·ё | MyWeG">
  <meta property="og:description" content="лӮҳл§Ңмқҳ мІҙмӨ‘ ліҖнҷ” к·ёлһҳн”„ вҖ” кё°лЎқн•ҳкі , л¶„м„қн•ҳкі , лӘ©н‘ңлҘј мқҙлЈЁм„ёмҡ”.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    #barWrap{position:relative;height:110px;width:100%;margin-top:1px;}
    #barWrap canvas{background:#0d1117;border-radius:0 0 10px 10px;}
    #mainC{border-radius:10px 10px 0 0;background:#0d1117;display:block;}
    .opt-panel{
      display:flex;flex-wrap:wrap;align-items:center;gap:6px 14px;
      padding:8px 12px;background:rgba(255,255,255,.03);
      border:1px solid var(--border);border-radius:8px;margin-top:8px;
    }
    .opt-item{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:var(--muted);white-space:nowrap;}
    .opt-item input[type=checkbox]{accent-color:var(--teal);width:13px;height:13px;cursor:pointer;}
    .opt-item:hover{color:var(--text);}
    .opt-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;}
    .opt-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;white-space:nowrap;}
  </style>
</head>
<body>
<header class="top-bar">
  <span class="title">рҹ“Ҡ л§ҲмӣЁк·ё</span>
  <nav class="side-nav" id="sideNav"></nav>
  <button class="btn btn-ghost btn-sm" id="logoutBtn" style="display:none" onclick="doLogout()">лЎңк·ём•„мӣғ</button>
  <div class="user-chip" onclick="openProfileEdit()">
    <span id="chipEmoji">вҡ–пёҸ</span><span id="chipName">-</span>
    <span style="font-size:10px;color:var(--muted);margin-left:2px" id="chipEdit"></span>
  </div>
</header>

<!-- н”„лЎңн•„ мҲҳм • лӘЁлӢ¬ -->
<div class="modal-bg" id="profileModal">
  <div class="modal">
    <h3>вңҸпёҸ н”„лЎңн•„ мҲҳм •</h3>
    <div class="input-group">
      <label class="input-label">мқҙлӘЁм§Җ</label>
      <div id="profileEmojiGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:8px"></div>
      <input class="input-field" id="profileCustomEmoji" placeholder="м§Ғм ‘ мһ…л Ҙ (мҳҲ: рҹҰҒ)" maxlength="4">
    </div>
    <div class="flex-row gap-8 mt-12">
      <button class="btn btn-ghost btn-full" onclick="closeProfileEdit()">м·ЁмҶҢ</button>
      <button class="btn btn-primary btn-full" onclick="saveProfileEdit()">м ҖмһҘ</button>
    </div>
  </div>
</div>

<div class="page">
  <div id="content">
    <div class="loading"><div class="spinner"></div> л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>
<div class="toast" id="toast"></div>

<script type="module">
import { getUser, getWeights, getSettings, updateSettings, setWeight, toDateStr, parseWeight, updateUser } from './js/db.js';
import { isAuthed, clearAuth } from './js/auth.js';
import { renderChart, calcStats } from './js/chart-render.js';

const uid = new URLSearchParams(location.search).get('user') || localStorage.getItem('uid');
const isAdminView = new URLSearchParams(location.search).get('admin_view') === '1';
if (!uid) location.href='index.html';

window.doLogout = () => { clearAuth(); localStorage.removeItem('uid'); location.href='index.html'; };

function buildNav(uid) {
  const links=[
    {href:`dashboard.html?user=${uid}`,icon:'рҹ“Ҡ',label:'к·ёлһҳн”„',id:'dashboard'},
    {href:`input.html?user=${uid}`,    icon:'вңҸпёҸ', label:'мһ…л Ҙ',  id:'input'},
    {href:`import.html?user=${uid}`,   icon:'рҹ“Ҙ', label:'к°Җм ёмҳӨкё°',id:'import'},
  ];
  [document.getElementById('bottomNav'),document.getElementById('sideNav')].forEach((nav,ni)=>{
    links.forEach(l=>{
      const a=document.createElement('a');
      a.href=l.href; a.className=l.id==='dashboard'?'active':'';
      a.innerHTML=ni===0?`<span class="icon">${l.icon}</span>${l.label}`:`${l.icon} ${l.label}`;
      nav.appendChild(a);
    });
  });
}

let S={}, user=null, records=[];

async function render() {
  buildNav(uid);
  [user, records, S] = await Promise.all([getUser(uid), getWeights(uid), getSettings()]);
  if (!isAdminView) {
    document.getElementById('logoutBtn').style.display='';
    document.getElementById('chipEdit').textContent = 'вңҸпёҸ';
  }
  if (!user) { location.href='index.html'; return; }

  // л№„л°ҖлІҲнҳё мқёмҰқ мІҙнҒ¬ (кҙҖлҰ¬мһҗл·° м ңмҷё)
  if (!isAdminView && user.passwordHash && !isAuthed(uid, user.passwordHash)) {
    location.href = `index.html?auth_required=${encodeURIComponent(uid)}`;
    return;
  }

  document.getElementById('chipName').textContent  = user.name;
  document.getElementById('chipEmoji').textContent = user.emoji||'вҡ–пёҸ';
  document.title = `${user.name} | л§ҲмӣЁк·ё`;

  const stats   = calcStats(records, user);
  const content = document.getElementById('content');

  if (!stats || records.filter(r=>r.weight).length < 2) {
    content.innerHTML=`
      <div class="card text-center" style="padding:48px 20px">
        <div style="font-size:40px;margin-bottom:12px">рҹ“ӯ</div>
        <p style="margin-bottom:16px;color:var(--muted)">м•„м§Ғ лҚ°мқҙн„°к°Җ м—Ҷм–ҙмҡ”.</p>
        <div class="flex-row gap-8" style="justify-content:center">
          <a href="input.html?user=${uid}" class="btn btn-primary">вңҸпёҸ мһ…л Ҙ</a>
          <a href="import.html?user=${uid}" class="btn btn-ghost">рҹ“Ҙ к°Җм ёмҳӨкё°</a>
        </div>
      </div>`;
    return;
  }

  const todayStr = toDateStr(new Date());
  const todayRecord = records.find(r => r.date === todayStr);

  content.innerHTML=`
    <div class="chart-title-bar">
      <span class="chart-title-text">рҹ“Ҡ мІҙмӨ‘ ліҖнҷ” к·ёлһҳн”„</span>
      <button class="zoom-reset-btn" onclick="resetZoom()">рҹ”Қ мҙҲкё°нҷ”</button>
    </div>
    <div class="chart-wrap">
      <canvas id="mainC"></canvas>
    </div><!-- /chart-wrap -->

    <!-- к·ёлһҳн”„ мҳөм…ҳ нҶ кёҖ -->
    <div class="opt-panel">
      <span class="opt-label">к·ёлһҳн”„</span>
      <label class="opt-item"><input type="checkbox" id="t7ma"  ${S.show7dayMA!==false?'checked':''}> 7мқјнҸүк· </label>
      <label class="opt-item"><input type="checkbox" id="tbar"  ${S.showWeeklyBar!==false?'checked':''}> мЈјк°„л§үлҢҖ</label>
      <label class="opt-item"><input type="checkbox" id="tpred" ${S.showPrediction?'checked':''}> мҳҲмғҒк·ёлһҳн”„</label>
      <div class="opt-sep"></div>
      <span class="opt-label">л§җн’Қм„ </span>
      <label class="opt-item"><input type="checkbox" id="mMax" ${S.showMaxMarker!==false?'checked':''}> мөңкі </label>
      <label class="opt-item"><input type="checkbox" id="mMin" ${S.showMinMarker!==false?'checked':''}> мөңм Җ</label>
      <label class="opt-item"><input type="checkbox" id="mCur" ${S.showCurMarker!==false?'checked':''}> нҳ„мһ¬</label>
      <div class="opt-sep"></div>
      <span class="opt-label">мҠӨнғҜ</span>
      <label class="opt-item"><input type="checkbox" id="sPeriod"  ${S.showStatPeriod!==false?'checked':''}> кё°к°„</label>
      <label class="opt-item"><input type="checkbox" id="sStart"   ${S.showStatStart!==false?'checked':''}> мӢңмһ‘</label>
      <label class="opt-item"><input type="checkbox" id="sCur"     ${S.showStatCurrent!==false?'checked':''}> нҳ„мһ¬</label>
      <label class="opt-item"><input type="checkbox" id="sLoss"    ${S.showStatLoss!==false?'checked':''}> мҙқк°җлҹү</label>
      <label class="opt-item"><input type="checkbox" id="sRatio"   ${S.showStatRatio!==false?'checked':''}> л№„мңЁ</label>
      <label class="opt-item"><input type="checkbox" id="sDaily"   ${S.showStatDaily!==false?'checked':''}> мқјнҸүк· </label>
      <label class="opt-item"><input type="checkbox" id="sWeekly"  ${S.showStatWeekly!==false?'checked':''}> мЈјнҸүк· </label>
      <label class="opt-item"><input type="checkbox" id="sGoal"    ${S.showStatGoal!==false?'checked':''}> лӘ©н‘ң</label>
      <label class="opt-item"><input type="checkbox" id="sETA"     ${S.showStatETA!==false?'checked':''}> мҳҲмғҒмқј</label>
      <label class="opt-item"><input type="checkbox" id="sBMI"     ${S.showStatBMI!==false?'checked':''}> BMI</label>
      <label class="opt-item"><input type="checkbox" id="sStreak"  ${S.showStatStreak!==false?'checked':''}> м—°мҶҚк°җлҹү</label>
    </div>

    <div class="stats-grid mt-12" id="statsGrid"></div>

    <!-- мҳӨлҠҳ мІҙмӨ‘ мһ…л Ҙ -->
    <div class="card mt-12">
      <div class="section-title" style="margin-bottom:10px">рҹ“… мҳӨлҠҳ мІҙмӨ‘ мһ…л Ҙ</div>
      <div style="display:flex;align-items:center;gap:10px">
        <input type="number" step="0.1" id="todayWeightInput" class="input-field"
          style="max-width:110px;margin-bottom:0"
          placeholder="--.-"
          value="${todayRecord?.weight != null ? todayRecord.weight.toFixed(1) : ''}">
        <span style="color:var(--muted);font-size:14px">kg</span>
        <button class="btn btn-primary btn-sm" onclick="saveTodayWeight()">м ҖмһҘ</button>
      </div>
    </div>

    <div class="flex-row gap-8 mt-12" style="justify-content:flex-end">
      <a href="input.html?user=${uid}" class="btn btn-ghost btn-sm">вңҸпёҸ м „мІҙ мһ…л Ҙ</a>
      <a href="import.html?user=${uid}" class="btn btn-ghost btn-sm">рҹ“Ҙ к°Җм ёмҳӨкё°</a>
    </div>`;

  doRender();
  renderStats(stats);
  bindToggles(stats);
}

// в”Җв”Җ н”„лЎңн•„ мқҙлӘЁм§Җ мҲҳм • в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const EMOJIS = [
  'вҡ–пёҸ','рҹ’Ә','рҹ”Ҙ','рҹ‘‘','рҹҸғ','рҹҢҹ','рҹҺҜ','рҹҳӨ',
  'рҹҰҒ','рҹҗҜ','рҹҗ»','рҹҗә','рҹҰҠ','рҹҗё','рҹҗј','рҹҰӢ',
  'рҹҚҺ','рҹҘ—','рҹҘ‘','рҹҺҪ','рҹҸӢпёҸ','рҹҡҙ','рҹ§ҳ','рҹ’Һ',
  'рҹҢҲ','вҡЎ','рҹҺ–пёҸ','рҹҸҶ','рҹҢҷ','вҳҖпёҸ','рҹ’«','вңЁ',
];
let selectedProfileEmoji = '';

window.openProfileEdit = () => {
  if(isAdminView) return;
  selectedProfileEmoji = document.getElementById('chipEmoji').textContent;
  const grid = document.getElementById('profileEmojiGrid');
  grid.innerHTML = EMOJIS.map(e =>
    `<button style="font-size:22px;padding:4px;border-radius:7px;cursor:pointer;background:${e===selectedProfileEmoji?'rgba(0,229,170,.15)':'transparent'};border:2px solid ${e===selectedProfileEmoji?'var(--teal)':'transparent'};transition:all .15s" onclick="pickProfileEmoji('${e}')">${e}</button>`
  ).join('');
  document.getElementById('profileCustomEmoji').value = '';
  document.getElementById('profileModal').classList.add('open');
};
window.closeProfileEdit = () => document.getElementById('profileModal').classList.remove('open');
window.pickProfileEmoji = e => {
  selectedProfileEmoji = e;
  document.getElementById('profileCustomEmoji').value = '';
  document.getElementById('profileEmojiGrid').querySelectorAll('button').forEach(b => {
    const isSelected = b.textContent === e;
    b.style.background = isSelected ? 'rgba(0,229,170,.15)' : 'transparent';
    b.style.border = `2px solid ${isSelected ? 'var(--teal)' : 'transparent'}`;
  });
};
window.saveProfileEdit = async () => {
  const custom = document.getElementById('profileCustomEmoji').value.trim();
  const emoji  = custom || selectedProfileEmoji;
  if(!emoji) return;
  await updateUser(uid, { emoji });
  user = { ...user, emoji };
  document.getElementById('chipEmoji').textContent = emoji;
  closeProfileEdit();
  showToast('н”„лЎңн•„ ліҖкІҪлҗЁ вң“', 'ok');
};

window.saveTodayWeight = async () => {
  const input = document.getElementById('todayWeightInput');
  const val = parseWeight(input.value);
  if (val === null) { showToast('мІҙмӨ‘мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”', 'err'); return; }
  const todayStr = toDateStr(new Date());
  await setWeight(uid, todayStr, val);
  input.value = val.toFixed(1);
  records = await getWeights(uid);
  const newStats = calcStats(records, user);
  doRender();
  if (newStats) renderStats(newStats);
  showToast('м ҖмһҘлҗҗм–ҙмҡ” вң“', 'ok');
};

window.resetZoom = () => {
  const mc = document.getElementById('mainC');
  if (mc?._chartInstance) mc._chartInstance.resetZoom();
};
function bindToggles_dummy() {
}

function doRender() {
  const mainC=document.getElementById('mainC');
  if(mainC) {
    renderChart(records, user, mainC, null, S);
    bindWheelScroll(mainC);
  }
}

function bindWheelScroll(canvas) {
  // мқҙм „ лҰ¬мҠӨл„Ҳ м ңкұ° нӣ„ мһ¬л“ұлЎқ
  if(canvas._wheelHandler) canvas.removeEventListener('wheel', canvas._wheelHandler, true);
  canvas._wheelHandler = e => {
    const chart = canvas._chartInstance;
    if(!chart) return;
    const xs = chart.scales.x;
    const fullRange = (canvas._endTs - canvas._startTs);
    const isMaxOut  = (xs.max - xs.min) >= fullRange * 0.98;
    if(isMaxOut && e.deltaY > 0) {
      // мӨҢм•„мӣғ мөңлҢҖ + м•„лһҳлЎң мҠӨнҒ¬лЎӨ вҶ’ zoom н”Ңлҹ¬к·ёмқё м°ЁлӢЁ, нҺҳмқҙм§Җ мҠӨнҒ¬лЎӨ н—Ҳмҡ©
      e.stopImmediatePropagation();
    }
  };
  canvas.addEventListener('wheel', canvas._wheelHandler, {capture:true, passive:true});
}

const fmt = d => {
  const dt=new Date(d);
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
};

function renderStats(stats) {
  if (!stats) return;
  const sg=document.getElementById('statsGrid'); if(!sg) return;
  const sc=(label,value,cls='')=>
    `<div class="stat-card ${cls}"><div class="s-label">${label}</div><div class="s-value">${value}</div></div>`;
  const cards=[
    S.showStatPeriod!==false  && sc('рҹ“… кё°к°„',`${fmt(stats.startDate)} ~<br>${fmt(stats.endDate)}<br>(${stats.days}мқј)`),
    S.showStatStart!==false   && sc('рҹҸҒ мӢңмһ‘ мІҙмӨ‘',`${stats.startW.toFixed(1)} kg`),
    S.showStatCurrent!==false && sc('рҹ“Қ нҳ„мһ¬ мІҙмӨ‘',`${stats.curW.toFixed(1)} kg`,'highlight'),
    S.showStatLoss!==false    && sc('рҹ“ү мҙқ к°җлҹү',`-${stats.loss} kg`),
    S.showStatRatio!==false   && sc('рҹ“Ҡ к°җлҹү л№„мңЁ',`${stats.ratio} %`),
    S.showStatDaily!==false   && sc('рҹ“Ҷ мқј нҸүк· ',`-${stats.daily} kg/day`),
    S.showStatWeekly!==false  && sc('рҹ“… мЈј нҸүк· ',`-${stats.weekly} kg/week`),
    S.showStatGoal!==false    && sc('рҹҺҜ лӘ©н‘ңк№Ңм§Җ',`${stats.remaining} kg лӮЁмқҢ`),
    S.showStatETA!==false     && sc('рҹҸҶ лӢ¬м„ұ мҳҲмғҒмқј',stats.etaStr,'warn'),
    S.showStatBMI!==false && stats.bmi && sc('вҡ–пёҸ нҳ„мһ¬ BMI',stats.bmi),
    S.showStatStreak!==false && stats.currentStreak>0 && sc('рҹ”Ҙ м—°мҶҚ к°җлҹү',`${stats.currentStreak}мЈј м—°мҶҚ`),
    S.showStatStreak!==false && stats.maxStreak>0     && sc('рҹҸ… мөңмһҘ м—°мҶҚ',`${stats.maxStreak}мЈј`),
  ].filter(Boolean);
  sg.innerHTML = cards.join('');
}

function bindToggles(stats) {
  // к·ёлһҳн”„ нҶ кёҖ
  const bind=(id, key, extra)=>{
    document.getElementById(id)?.addEventListener('change', async e=>{
      S={...S,[key]:e.target.checked};
      if(extra) extra(e.target.checked);
      await updateSettings({[key]:e.target.checked});
      doRender(); renderStats(stats);
    });
  };
  bind('t7ma','show7dayMA');
  bind('tbar','showWeeklyBar');
  bind('tpred','showPrediction');

  // мҠӨнғҜ нҶ кёҖ
  const statBinds=[
    ['sPeriod','showStatPeriod'],['sStart','showStatStart'],['sCur','showStatCurrent'],
    ['sLoss','showStatLoss'],['sRatio','showStatRatio'],['sDaily','showStatDaily'],
    ['sWeekly','showStatWeekly'],['sGoal','showStatGoal'],['sETA','showStatETA'],
    ['sBMI','showStatBMI'],['sStreak','showStatStreak'],
  ];
  // л§җн’Қм„  нҶ кёҖ
  const markerBinds=[['mMax','showMaxMarker'],['mMin','showMinMarker'],['mCur','showCurMarker']];
  markerBinds.forEach(([id,key])=>{
    document.getElementById(id)?.addEventListener('change', async e=>{
      S={...S,[key]:e.target.checked};
      await updateSettings({[key]:e.target.checked});
      doRender();
    });
  });
  statBinds.forEach(([id,key])=>{
    document.getElementById(id)?.addEventListener('change', async e=>{
      S={...S,[key]:e.target.checked};
      await updateSettings({[key]:e.target.checked});
      renderStats(stats);
    });
  });
}

render().catch(e=>{
  document.getElementById('content').innerHTML=
    `<div class="card"><p class="text-muted">мҳӨлҘҳ: ${e.message}</p></div>`;
});

// м°Ҫ нҒ¬кё° л°”лҖҢл©ҙ л‘җ м°ЁнҠё мһ¬л ҢлҚ” (padding мһ¬кі„мӮ°)
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if(document.getElementById('mainC')) doRender();
  }, 200);
});

// к·ёлһҳн”„ л°”к№Ҙ н„°м№ҳ мӢң нҲҙнҢҒ лӢ«кё°
document.addEventListener('touchstart', e => {
  const c = document.getElementById('mainC');
  if (c && !c.contains(e.target) && c._chartInstance) {
    c._chartInstance.tooltip.setActiveElements([], {x:0,y:0});
    c._chartInstance.update();
  }
}, {passive:true});

</script>
<script src="register-sw.js"></script>
</body>
</html>
