<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <title>마웨그 | My Weight Graph</title>
  <meta name="description" content="나만의 체중 변화 그래프 — 기록하고, 분석하고, 목표를 이루세요.">
  <meta property="og:title" content="마웨그 | MyWeG">
  <meta property="og:description" content="나만의 체중 변화 그래프 — 기록하고, 분석하고, 목표를 이루세요.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin:6px 0 10px;}
    .emoji-btn{font-size:22px;padding:5px;border-radius:7px;cursor:pointer;background:transparent;
      border:2px solid transparent;transition:all .15s;text-align:center;line-height:1;}
    .emoji-btn:hover{background:rgba(255,255,255,.07);}
    .emoji-btn.selected{border-color:var(--teal);background:rgba(0,229,170,.1);}
  </style>
</head>
<body>
<div class="landing" id="app">
  <div class="spinner" style="margin-bottom:24px"></div>
</div>

<!-- 사용자 추가 모달 -->
<div class="modal-bg" id="addModal">
  <div class="modal" style="max-height:90vh;overflow-y:auto">
    <h3>➕ 새 사용자 추가</h3>
    <div class="input-group">
      <label class="input-label">이름 *</label>
      <input class="input-field" id="newName" placeholder="홍길동" maxlength="12">
    </div>
    <div class="input-group">
      <label class="input-label">이모지 선택</label>
      <div class="emoji-grid" id="emojiGrid"></div>
      <input class="input-field" id="newEmoji" placeholder="직접 입력 (예: 🦁)" maxlength="4"
        oninput="onCustomEmoji(this.value)">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="input-group">
        <label class="input-label">키 (cm)</label>
        <input class="input-field" id="newHeight" type="number" placeholder="175" min="100" max="250">
      </div>
      <div class="input-group">
        <label class="input-label">출생연도</label>
        <input class="input-field" id="newBirthYear" type="number" placeholder="1990" min="1930" max="2010">
      </div>
    </div>
    <div class="input-group">
      <label class="input-label">목표 체중 (kg)</label>
      <input class="input-field" id="newGoal" type="number" placeholder="80" min="30" max="200">
    </div>
    <div class="flex-row gap-8 mt-12">
      <button class="btn btn-ghost btn-full" onclick="closeModal()">취소</button>
      <button class="btn btn-primary btn-full" onclick="submitNewUser()">추가</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { getUsers, createUser } from './js/db.js';

const EMOJIS = [
  '⚖️','💪','🔥','👑','🏃','🌟','🎯','😤',
  '🦁','🐯','🐻','🐺','🦊','🐸','🐼','🦋',
  '🍎','🥗','🥑','🎽','🏋️','🚴','🧘','💎',
  '🌈','⚡','🎖️','🏆','🌙','☀️','💫','✨',
];
let selectedEmoji = EMOJIS[0];

// ── 이모지 그리드 ────────────────────────────────────────────────────
function buildEmojiGrid() {
  document.getElementById('emojiGrid').innerHTML = EMOJIS.map(e =>
    `<button class="emoji-btn ${e===selectedEmoji?'selected':''}" onclick="pickEmoji('${e}')">${e}</button>`
  ).join('');
}
window.pickEmoji = e => {
  selectedEmoji = e;
  document.getElementById('newEmoji').value = '';
  buildEmojiGrid();
};
window.onCustomEmoji = val => {
  if (val.trim()) {
    selectedEmoji = val.trim();
    document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));
  }
};

// ── 사용자 목록 렌더 ─────────────────────────────────────────────────
async function render() {
  const app = document.getElementById('app');
  try {
    const timeout = new Promise((_,rej) => setTimeout(()=>rej(new Error('연결 시간 초과. 네트워크를 확인해주세요.')), 10000));
    const users = await Promise.race([getUsers(), timeout]);
    app.innerHTML = `
      <h1>체중 <span>그래프</span></h1>
      <p>사용자를 선택하세요</p>
      <div class="user-grid" id="userGrid"></div>
      <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;justify-content:center">
        <button class="btn btn-ghost" onclick="openModal()">➕ 새 사용자 추가</button>
        <a href="admin-login.html" class="btn btn-ghost" style="font-size:12px;color:var(--muted)">🔐 관리자</a>
      </div>`;

    const grid = document.getElementById('userGrid');
    if (!users.length) {
      grid.innerHTML='<p class="text-muted text-center" style="grid-column:1/-1;padding:24px 0">아직 사용자가 없어요.</p>';
    } else {
      users.forEach(u => {
        const card = document.createElement('div');
        card.className='user-card';
        card.innerHTML=`
          <div class="avatar">${u.emoji||'⚖️'}</div>
          <div class="name">${u.name}</div>
          <div class="sub">${u.goal?`목표 ${u.goal} kg`:''}</div>`;
        card.onclick = () => {
          localStorage.setItem('uid', u.id);
          location.href = `dashboard.html?user=${encodeURIComponent(u.id)}`;
        };
        grid.appendChild(card);
      });
    }
  } catch(e) {
    app.innerHTML=`<p class="text-muted" style="max-width:320px">Firebase 연결 오류<br><small>${e.message}</small></p>`;
  }
}

// ── 사용자 생성 ──────────────────────────────────────────────────────
window.openModal = () => {
  selectedEmoji=EMOJIS[0];
  document.getElementById('addModal').classList.add('open');
  document.getElementById('newEmoji').value='';
  buildEmojiGrid();
};
window.closeModal = () => document.getElementById('addModal').classList.remove('open');

window.submitNewUser = async () => {
  const name      = document.getElementById('newName').value.trim();
  const emoji     = document.getElementById('newEmoji').value.trim()||selectedEmoji;
  const height    = parseInt(document.getElementById('newHeight').value)||null;
  const birthYear = parseInt(document.getElementById('newBirthYear').value)||null;
  const goal      = parseFloat(document.getElementById('newGoal').value)||80;

  if (!name) { showToast('이름을 입력해주세요','err'); return; }

  const id = name.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+Date.now().toString(36);
  await createUser({id, name, emoji, goal, height, birthYear});
  closeModal();
  showToast(`${name} 추가 완료!`,'ok');
  render();
};

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.className='toast',2500);
}
render();
</script>
<script src="register-sw.js"></script>
</body>
</html>
